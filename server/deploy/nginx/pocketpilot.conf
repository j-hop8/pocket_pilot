# PocketPilot backend — nginx reverse proxy (HTTP template).
# setup-vm.sh installs this as /etc/nginx/sites-available/pocketpilot; running
#   certbot --nginx -d <host> --redirect
# then edits it in place to add the `listen 443 ssl` block + the 80->443 redirect.
# The hardening directives below are carried into the TLS server by certbot.
#
# NOTE: depends on the `ppapi` limit_req zone declared (http context) in
# pocketpilot-limits.conf — install that into /etc/nginx/conf.d/ alongside this.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 35.212.221.51.sslip.io;

    # Reject oversized / slow-loris requests early. The API carries tiny or empty
    # bodies (/sync/now has no body), so a 1 MB cap is generous.
    client_max_body_size  1m;
    client_header_timeout 10s;
    client_body_timeout   10s;
    send_timeout          15s;

    # Defense-in-depth response headers (HSTS is added by certbot on the TLS
    # server). `always` so they're sent on error responses too; set at server
    # scope so every location inherits them.
    add_header X-Content-Type-Options nosniff     always;
    add_header X-Frame-Options        DENY        always;
    add_header Referrer-Policy        no-referrer always;

    # Liveness probe: never rate-limited, no access-log noise (uptime monitors).
    location = /healthz {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        # Coarse per-IP flood guard (zone defined in pocketpilot-limits.conf).
        limit_req zone=ppapi burst=20 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # Overwrite (NOT append via $proxy_add_x_forwarded_for) so a client-supplied
        # X-Forwarded-For can't spoof Fastify's req.ip and dodge the per-IP limit.
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    300s;
    }
}
