# Per-IP rate-limit zone for the PocketPilot API (http context).
# Installed to /etc/nginx/conf.d/pocketpilot-limits.conf and referenced by
# sites-available/pocketpilot's `limit_req zone=ppapi`. 10 r/s + burst 20 sits
# well above normal use (the app hits this origin only for /sync/now) — it just
# sheds floods before they reach Node / a headful Chromium scrape.
limit_req_zone $binary_remote_addr zone=ppapi:10m rate=10r/s;
