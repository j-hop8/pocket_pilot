name: Frontend (Cloudflare Workers)

# Builds the Flutter web app and deploys it to Cloudflare Workers (static assets).
#   - push to main  -> production deploy   (wrangler deploy)
#   - pull request  -> preview version     (wrangler versions upload; URL on the PR)
# Flutter is built HERE rather than in Cloudflare's git build because Cloudflare's
# build image has no Flutter buildpack. wrangler then uploads the built build/web
# (see wrangler.jsonc -> assets.directory). Do NOT also connect this repo to
# Cloudflare Workers Builds (the dashboard git integration) — it would re-run
# `wrangler deploy` without a Flutter build and fail on the missing build/web.
# Build-time config is injected with --dart-define from GitHub secrets; the
# Supabase anon key is the publishable key, so it's safe in the client bundle.

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "web/**"
      - "packages/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - "wrangler.jsonc"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "lib/**"
      - "web/**"
      - "packages/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "analysis_options.yaml"
      - "wrangler.jsonc"
      - ".github/workflows/frontend.yml"

# One deploy per ref; cancel a run that a newer push supersedes.
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # let wrangler-action post the preview URL on PRs
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.8
          channel: stable
          cache: true

      - run: flutter pub get

      # Gate: a failing analyze/test blocks the deploy.
      - run: flutter analyze
      - run: flutter test

      - name: Build web
        run: |
          flutter build web --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }} \
            --dart-define=BACKEND_URL=${{ secrets.BACKEND_URL }}

      # wrangler v4 (installed by wrangler-action) needs Node >= 22; pin it so the
      # deploy doesn't depend on the runner's default Node version.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # push to main -> production deploy; PR -> upload a preview version (its URL
      # is posted back on the PR). wrangler uploads build/web per wrangler.jsonc;
      # the Worker named `pocketpilot` is created on the first deploy.
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: ${{ github.event_name == 'push' && 'deploy' || 'versions upload' }}
