name: CI (backend tests)

# PR gate for the Node backend: typecheck + parser/categorizer parity tests.
# The Flutter app's analyze/test gate lives in frontend.yml's PR path.

on:
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - run: npm run typecheck

      - run: npm test
